    // 全局状态
    let currentStationsList = [];
    let filteredStations = [];
    let currentRoomType = "all";
    
    // 初始化列筛选面板
    function initColumnFilterPanel() {
        const container = document.getElementById('columnCheckboxGroup');
        container.innerHTML = '';
        columnDefs.forEach(col => {
            const label = document.createElement('label');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.value = col.key;
            cb.checked = visibleColumns.includes(col.key);
            cb.onchange = (e) => {
                if (e.target.checked) {
                    if (!visibleColumns.includes(col.key)) visibleColumns.push(col.key);
                } else {
                    visibleColumns = visibleColumns.filter(k => k !== col.key);
                }
                renderTable();  // 重新渲染表格
            };
            label.appendChild(cb);
            label.appendChild(document.createTextNode(col.label));
            container.appendChild(label);
        });
    }
    
    function toggleAllColumns(selectAll) {
        visibleColumns = selectAll ? columnDefs.map(c => c.key) : [];
        // 更新复选框状态
        document.querySelectorAll('#columnCheckboxGroup input[type="checkbox"]').forEach(cb => {
            cb.checked = selectAll;
        });
        renderTable();
    }
    
    // 获取某一候车室数据中指定key的显示值（处理有无逻辑）
    function getCellValue(roomData, colKey) {
        if (!roomData) return '-';
        switch(colKey) {
            case 'count': return roomData.count;
            case 'area': return roomData.area;
            case 'hasToilet': return roomData.toilet === '有' ? 1 : 0;
            case 'noToilet': return roomData.toilet === '有' ? 0 : 1;
            case 'hasEnter': return roomData.enter === '有' ? 1 : 0;
            case 'noEnter': return roomData.enter === '有' ? 0 : 1;
            case 'hasWifi': return roomData.wifi === '有' ? 1 : 0;
            case 'noWifi': return roomData.wifi === '有' ? 0 : 1;
            case 'service': return roomData.service;
            case 'open': return roomData.open;
            case 'large': return roomData.large;
            case 'medium': return roomData.medium;
            case 'small': return roomData.small;
            case 'meeting': return roomData.meeting;
            default: return '-';
        }
    }
    
    // 动态生成表头（根据选中的候车室类型以及可见列）
    function renderDynamicHeader() {
        const thead = document.getElementById('tableHeader');
        // 固定列：序号，车站名称，路局，站段，车站等级
        const fixedCols = ['序号', '车站名称', '路局', '站段', '车站等级'];
        if (currentRoomType === "all") {
            const types = ['商务候车室', '商务座候车区', '商业候车室'];
            let headerHtml = '<tr>';
            // 第一行：固定列 + 每个类型占合并列
            headerHtml += `<th rowspan="2">序号</th><th rowspan="2">车站名称</th><th rowspan="2">路局</th><th rowspan="2">站段</th><th rowspan="2">车站等级</th>`;
            for (let type of types) {
                const visibleCount = visibleColumns.length;
                if (visibleCount > 0) {
                    headerHtml += `<th colspan="${visibleCount}">${type}</th>`;
                } else {
                    headerHtml += `<th colspan="1">${type}(无列)</th>`;
                }
            }
            headerHtml += `</tr><tr>`;
            // 第二行：每个类型下列出可见的小列名称
            for (let i = 0; i < types.length; i++) {
                for (let colKey of visibleColumns) {
                    const colDef = columnDefs.find(c => c.key === colKey);
                    headerHtml += `<th>${colDef ? colDef.label : colKey}</th>`;
                }
            }
            headerHtml += `</tr>`;
            thead.innerHTML = headerHtml;
        } else {
            const typeName = getRoomTypeName(currentRoomType);
            let headerHtml = '<tr>';
            headerHtml += `<th>序号</th><th>车站名称</th><th>路局</th><th>站段</th><th>车站等级</th>`;
            if (visibleColumns.length > 0) {
                for (let colKey of visibleColumns) {
                    const colDef = columnDefs.find(c => c.key === colKey);
                    headerHtml += `<th>${colDef ? colDef.label : colKey}</th>`;
                }
            } else {
                headerHtml += `<th>无显示列</th>`;
            }
            headerHtml += `</tr>`;
            thead.innerHTML = headerHtml;
        }
    }
    
    function getRoomTypeName(type) {

        return map[type] || "全部";
    }
    
    // 渲染表格数据

        let html = '';
        let serialNum = 1;
        for (let item of filteredStations) {
            const d = item.data;
            const levelDisplay = getLevelDisplay(d.level);
            html += `<tr><td class="serial-col">${serialNum++}</td><td class="station-name">${item.station}</td><td>${d.railway}</td><td>${d.section}</td><td>${levelDisplay}</td>`;
            
            if (currentRoomType === "all") {
                const b = d.business;
                const bs = d.businessSeat;
                const c = d.commercial;
                accumulateTotal(totals.business, b);
                accumulateTotal(totals.businessSeat, bs);
                accumulateTotal(totals.commercial, c);
                
                for (let roomData of [b, bs, c]) {
                    for (let colKey of visibleColumns) {
                        let val = getCellValue(roomData, colKey);
                        html += `<td class="number-cell">${val}</td>`;
                    }
                }
            } else {
                const roomData = d[currentRoomType];
                if (roomData) accumulateTotal(totals, roomData);
                for (let colKey of visibleColumns) {
                    let val = roomData ? getCellValue(roomData, colKey) : '-';
                    html += `<td class="number-cell">${val}</td>`;
                }
            }
            html += `</tr>`;
        }
        tbody.innerHTML = html;
        
        // 渲染总计行
        let totalHtml = `<tr class="total-row"><td class="serial-col"><strong>总计</strong></td><td colspan="4"></td>`;
        if (currentRoomType === "all") {
            for (let t of [totals.business, totals.businessSeat, totals.commercial]) {
                for (let colKey of visibleColumns) {
                    let sumVal = t[colKey] !== undefined ? t[colKey] : 0;
                    totalHtml += `<td class="number-cell">${sumVal}</td>`;
                }
            }
        } else {
            for (let colKey of visibleColumns) {
                let sumVal = totals[colKey] !== undefined ? totals[colKey] : 0;
                totalHtml += `<td class="number-cell">${sumVal}</td>`;
            }
        }
        totalHtml += `</tr>`;
        tfoot.innerHTML = totalHtml;
    }
    
    function initTotalObj() {
        let obj = {};
        columnDefs.forEach(col => { obj[col.key] = 0; });
        return obj;
    }
    
    function accumulateTotal(total, data) {
        if (!data) return;
        columnDefs.forEach(col => {
            let val = 0;
            switch(col.key) {
                case 'count': val = data.count; break;
                case 'area': val = data.area; break;
                case 'hasToilet': val = data.toilet === '有' ? 1 : 0; break;
                case 'noToilet': val = data.toilet === '有' ? 0 : 1; break;
                case 'hasEnter': val = data.enter === '有' ? 1 : 0; break;
                case 'noEnter': val = data.enter === '有' ? 0 : 1; break;
                case 'hasWifi': val = data.wifi === '有' ? 1 : 0; break;
                case 'noWifi': val = data.wifi === '有' ? 0 : 1; break;
                case 'service': val = data.service; break;
                case 'open': val = data.open; break;
                case 'large': val = data.large; break;
                case 'medium': val = data.medium; break;
                case 'small': val = data.small; break;
                case 'meeting': val = data.meeting; break;
                default: val = 0;
            }
            total[col.key] += val;
        });
    }
    
    // 筛选逻辑
    function applyFilters() {
        const level = document.getElementById('filterLevel').value;
        const roomType = document.getElementById('filterRoomType').value;
        currentRoomType = roomType;
        
        let filtered = [];
        for (let s of currentStationsList) {
            const d = stationData[s.station];
            if (!d) continue;
            if (level && d.level !== level) continue;
            filtered.push({ ...s, data: d });
        }
        filteredStations = filtered;
        renderTable();
        updatePathDisplay();
    }
    
    function resetFilters() {
        document.getElementById('filterLevel').value = '';
        document.getElementById('filterRoomType').value = 'all';
        currentRoomType = 'all';
        // 重置可见列为全选
        visibleColumns = columnDefs.map(c => c.key);
        initColumnFilterPanel();
        applyFilters();
    }
    
    function updatePathDisplay() {
        if (currentStationsList.length === 0) document.getElementById('currentPathDisplay').innerText = '国铁集团 (无车站)';
        else if (currentStationsList.length === Object.keys(stationData).length) document.getElementById('currentPathDisplay').innerText = '国铁集团 (全部车站)';
        else document.getElementById('currentPathDisplay').innerText = `已选 ${currentStationsList.length} 个车站`;
    }
    
    // 组织机构树
    function renderTree() {
        const container = document.getElementById('treeContainer');
        container.innerHTML = '';
        const allNode = document.createElement('div');
        allNode.className = 'tree-node';
        allNode.innerHTML = `<div class="tree-node-header" onclick="selectAllStations()"><span class="tree-icon">🏢</span><span class="node-name">📌 全部车站</span></div>`;
        container.appendChild(allNode);
        for (let railway in orgTree) {
            const railwayDiv = document.createElement('div');
            railwayDiv.className = 'tree-node';
            railwayDiv.innerHTML = `<div class="tree-node-header" onclick="toggleNode(this)"><span class="tree-icon">🏢</span><span class="node-name">${railway}</span></div>`;
            const railwayChildren = document.createElement('div'); railwayChildren.className = 'tree-children';
            for (let bureau in orgTree[railway]) {
                const bureauDiv = document.createElement('div'); bureauDiv.className = 'tree-node';
                bureauDiv.innerHTML = `<div class="tree-node-header" onclick="toggleNode(this)"><span class="tree-icon">🏛️</span><span class="node-name">${bureau}</span></div>`;
                const bureauChildren = document.createElement('div'); bureauChildren.className = 'tree-children';
                for (let section in orgTree[railway][bureau]) {
                    const sectionDiv = document.createElement('div'); sectionDiv.className = 'tree-node';
                    sectionDiv.innerHTML = `<div class="tree-node-header" onclick="toggleNode(this)"><span class="tree-icon">📁</span><span class="node-name">${section}</span></div>`;
                    const sectionChildren = document.createElement('div'); sectionChildren.className = 'tree-children';
                    for (let station of orgTree[railway][bureau][section]) {
                        if (!stationData[station]) continue;
                        const stationDiv = document.createElement('div'); stationDiv.className = 'tree-node';
                        stationDiv.innerHTML = `<div class="tree-node-header" onclick="selectStationNode('${railway}','${bureau}','${section}','${station}')"><span class="tree-icon">🚉</span><span class="node-name">${station}</span></div>`;
                        sectionChildren.appendChild(stationDiv);
                    }
                    sectionDiv.appendChild(sectionChildren);
                    bureauChildren.appendChild(sectionDiv);
                }
                bureauDiv.appendChild(bureauChildren);
                railwayChildren.appendChild(bureauDiv);
            }
            railwayDiv.appendChild(railwayChildren);
            container.appendChild(railwayDiv);
        }
    }
    
    function selectStationNode(railway, bureau, section, station) {
        currentStationsList = [{ railway, bureau, section, station }];
        applyFilters();
        document.querySelectorAll('.tree-node-header').forEach(el => el.classList.remove('selected'));
        if (event && event.currentTarget) event.currentTarget.classList.add('selected');
    }
    
    function selectAllStations() {
        currentStationsList = [];
        for (let railway in orgTree) {
            for (let bureau in orgTree[railway]) {
                for (let section in orgTree[railway][bureau]) {
                    for (let station of orgTree[railway][bureau][section]) {
                        if (stationData[station]) currentStationsList.push({ railway, bureau, section, station });
                    }
                }
            }
        }
        applyFilters();
        document.querySelectorAll('.tree-node-header').forEach(el => el.classList.remove('selected'));
    }
    
    function toggleNode(header) {
        const children = header.parentElement.querySelector('.tree-children');
        if (children) children.classList.toggle('open');
    }
    
    // 导出Excel（基于当前可见列和筛选数据）
    function exportToExcel() {
        if (!filteredStations.length) { alert("无数据可导出"); return; }
        let csvRows = [];
        let headers = ["序号", "车站名称", "路局", "站段", "车站等级"];
        if (currentRoomType === "all") {
            const types = ["商务候车室", "商务座候车区", "商业候车室"];
            for (let type of types) {
                for (let colKey of visibleColumns) {
                    let colDef = columnDefs.find(c => c.key === colKey);
                    headers.push(`${type}_${colDef ? colDef.label : colKey}`);
                }
            }
        } else {
            let typeName = getRoomTypeName(currentRoomType);
            for (let colKey of visibleColumns) {
                let colDef = columnDefs.find(c => c.key === colKey);
                headers.push(`${typeName}_${colDef ? colDef.label : colKey}`);
            }
        }
        csvRows.push(headers.join(","));
        let serial = 1;
        for (let item of filteredStations) {
            const d = item.data;
            let row = [serial++, item.station, d.railway, d.section, getLevelDisplay(d.level)];
            if (currentRoomType === "all") {
                for (let room of [d.business, d.businessSeat, d.commercial]) {
                    for (let colKey of visibleColumns) {
                        row.push(getCellValue(room, colKey));
                    }
                }
            } else {
                let room = d[currentRoomType];
                for (let colKey of visibleColumns) {
                    row.push(room ? getCellValue(room, colKey) : '-');
                }
            }
            csvRows.push(row.map(cell => `"${cell}"`).join(","));
        }
        const blob = new Blob(["\uFEFF" + csvRows.join("\n")], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", "商务候车室统计报表.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }
    
    // 初始化
    initColumnFilterPanel();
    renderTree();
    selectAllStations();
</script>
