        .data-table th { background: #1e3c72; color: white; padding: 8px 4px; text-align: center; border: 1px solid #2a5298; position: sticky; top: 0; font-weight: 600; font-size: 11px; }

    function initColumnFilterPanel() {
        // 基础指标面板
        const mainContainer = document.getElementById('mainColumnCheckboxGroup');
        mainContainer.innerHTML = '';
        mainColumnDefs.forEach(col => {
            const label = document.createElement('label');
            const cb = document.createElement('input');
            cb.type = 'checkbox'; cb.value = col.key; cb.checked = visibleColumns.includes(col.key);
            cb.onchange = () => {
                if (cb.checked) { if (!visibleColumns.includes(col.key)) visibleColumns.push(col.key); }
                else { visibleColumns = visibleColumns.filter(k => k !== col.key); }
                visibleColumns.sort((a,b) => allColumnDefs.findIndex(c=>c.key===a) - allColumnDefs.findIndex(c=>c.key===b));
                renderTable();
            };
            label.appendChild(cb); label.appendChild(document.createTextNode(col.label));
            mainContainer.appendChild(label);
        });

    function getCellValue(roomData, colKey) {
        if (!roomData) return '-';
        switch(colKey) {
            case 'count': return roomData.count;
            case 'area': return roomData.area;
            case 'hasToilet': return roomData.toilet === '有' ? 1 : 0;
            case 'noToilet': return roomData.toilet === '有' ? 0 : 1;
            case 'hasEnter': return roomData.enter === '有' ? 1 : 0;
            case 'noEnter': return roomData.enter === '有' ? 0 : 1;
            case 'hasWifi': return roomData.wifi === '有' ? 1 : 0;
            case 'noWifi': return roomData.wifi === '有' ? 0 : 1;
            case 'service': return roomData.service;
            case 'open': return roomData.open;
            case 'large': return roomData.large;
            case 'medium': return roomData.medium;
            case 'small': return roomData.small;
            case 'meeting': return roomData.meeting;
            default: return '-';
        }
    }

    function renderDynamicHeader() {
        const thead = document.getElementById('tableHeader');
        const selectedTypes = getSelectedRoomTypes();
        if (selectedTypes.length === 0) { thead.innerHTML = '<tr><th colspan="5">请至少选择一个候车室类型</th></tr>'; return; }
        
        let headerHtml = '<tr>';
        headerHtml += '<th rowspan="2">序号</th><th rowspan="2">车站名称</th><th rowspan="2">路局</th><th rowspan="2">站段</th><th rowspan="2">车站等级</th>';
        for (let type of selectedTypes) {
            const visibleCount = visibleColumns.length;
            if (visibleCount > 0) {
                headerHtml += `<th colspan="${visibleCount}">${getRoomTypeName(type)}</th>`;
            } else {
                headerHtml += `<th colspan="1">${getRoomTypeName(type)}(无列)</th>`;
            }
        }
        headerHtml += '<tr>';
        for (let i = 0; i < selectedTypes.length; i++) {
            for (let colKey of visibleColumns) {
                const colDef = allColumnDefs.find(c => c.key === colKey);
                headerHtml += `<th>${colDef ? colDef.label : colKey}</th>`;
            }
        }
        headerHtml += '</tr>';
        thead.innerHTML = headerHtml;
    }
    
    function renderTable() {
        const selectedTypes = getSelectedRoomTypes();
        if (selectedTypes.length === 0) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px;">请至少选择一个候车室类型</td></tr>';
            document.getElementById('tableFoot').innerHTML = '';
            renderDynamicHeader();
            return;
        }
        
        renderDynamicHeader();
        const tbody = document.getElementById('tableBody');
        const tfoot = document.getElementById('tableFoot');
        
        if (!filteredStations.length) {
            const visibleCount = visibleColumns.length;
            let colSpan = 5 + selectedTypes.length * Math.max(visibleCount, 1);
            tbody.innerHTML = `<tr><td colspan="${colSpan}" style="text-align:center; padding:30px;">暂无数据</td></tr>`;
            tfoot.innerHTML = '';
            return;
        }
        
        let totals = {};
        selectedTypes.forEach(type => {
            totals[type] = initTotalObj();
        });
        
        let html = '';
        let serialNum = 1;
        for (let item of filteredStations) {
            const d = item.data;
            html += `<tr><td class="serial-col">${serialNum++}</td><td class="station-name">${item.station}</td><td>${d.railway}</td><td>${d.section}</td><td>${d.level}</td>`;
            
            for (let type of selectedTypes) {
                const roomData = d[type];
                if (roomData) accumulateTotal(totals[type], roomData);
                for (let colKey of visibleColumns) {
                    let val = roomData ? getCellValue(roomData, colKey) : '-';
                    html += `<td class="number-cell">${val}</td>`;
                }
            }
            html += `</tr>`;
        }
        tbody.innerHTML = html;
        
        let totalHtml = `<tr class="total-row"><td class="serial-col"><strong>总计</strong></td><td colspan="4">`;
        for (let type of selectedTypes) {
            for (let colKey of visibleColumns) {
                let sumVal = totals[type][colKey] !== undefined ? totals[type][colKey] : 0;
                totalHtml += `<td class="number-cell">${sumVal}</td>`;
            }
        }
        totalHtml += `</tr>`;
        tfoot.innerHTML = totalHtml;
    }
    
    function initTotalObj() {
        let obj = {};
        allColumnDefs.forEach(col => { obj[col.key] = 0; });
        return obj;
    }
    
    function accumulateTotal(total, data) {
        if (!data) return;
        allColumnDefs.forEach(col => {
            let val = 0;
            switch(col.key) {
                case 'count': val = data.count; break;
                case 'area': val = data.area; break;
                case 'hasToilet': val = data.toilet === '有' ? 1 : 0; break;
                case 'noToilet': val = data.toilet === '有' ? 0 : 1; break;
                case 'hasEnter': val = data.enter === '有' ? 1 : 0; break;
                case 'noEnter': val = data.enter === '有' ? 0 : 1; break;
                case 'hasWifi': val = data.wifi === '有' ? 1 : 0; break;
                case 'noWifi': val = data.wifi === '有' ? 0 : 1; break;
                case 'service': val = data.service; break;
                case 'open': val = data.open; break;
                case 'large': val = data.large; break;
                case 'medium': val = data.medium; break;
                case 'small': val = data.small; break;
                case 'meeting': val = data.meeting; break;
                default: val = 0;
            }
            total[col.key] += val;
        });
    }
    
    function applyFilters() {
        let level = document.getElementById('filterLevel').value;
        let filtered = [];
        for (let s of currentStationsList) {
            let d = stationData[s.station];
            if (!d) continue;
            if (level && d.level !== level) continue;
            filtered.push({ ...s, data: d });
        }
        filteredStations = filtered;
        renderTable();
        document.getElementById('currentPathDisplay').innerText = currentStationsList.length===0?'国铁集团 (无车站)':(currentStationsList.length===Object.keys(stationData).length?'国铁集团 (全部车站)':`已选 ${currentStationsList.length} 个车站`);
    }
    
    function resetFilters() {
        document.getElementById('filterLevel').value = '';
        document.querySelectorAll('#roomTypeCheckboxGroup input').forEach(cb=>cb.checked=true);
        selectedRoomTypes = ["business","businessSeat","commercial"];
        visibleColumns = allColumnDefs.map(c=>c.key);
        initColumnFilterPanel();
        applyFilters();
    }
    
    function showStatsModal() {
        if (!filteredStations.length) { alert("暂无数据"); return; }
        if (selectedStatFields.length === 0) { alert("请先勾选需要统计的字段"); return; }
        
        const selectedRoomTypesList = getSelectedRoomTypes();
        if (selectedRoomTypesList.length === 0) { alert("请至少选择一个候车室类型"); return; }
        
        const selectedFacilityTypes = getSelectedFacilityTypesFromColumns();
        if (selectedFacilityTypes.length === 0) { alert("请在\"显示列筛选 - 设施类型\"中至少选择一个设施类型"); return; }
        
        const roomTypeNames = { business: "商务候车室", businessSeat: "商务座候车区", commercial: "商业候车室" };
        const facilityInfoMap = {};
        for (let ft of facilityTypeMap) {
            facilityInfoMap[ft.key] = ft;
        }
        
        let allHtml = '';
        let facilityColspan = selectedStatFields.length;
        
        for (let roomType of selectedRoomTypesList) {
            allHtml += `<div class="stats-group-title">📌 ${roomTypeNames[roomType]}</div>`;
            allHtml += `<div class="stats-subtitle">当前筛选出 ${filteredStations.length} 个车站</div>`;
            
            // 第一行：固定列 + 设施类型合并行
            let firstRowFixedCols = ['序号', '车站名称', '所属路局', '所属站段', '车站等级'];
            let firstRowFacilityCols = [];
            for (let facilityType of selectedFacilityTypes) {
                const facilityName = facilityInfoMap[facilityType]?.name || facilityType;
                firstRowFacilityCols.push({ value: facilityName, colspan: facilityColspan });
            }
            
            // 第二行：只有设施类型下的具体统计字段
            let secondRowFieldCols = [];
            for (let facilityType of selectedFacilityTypes) {
                for (let field of selectedStatFields) {
                    const fieldLabel = facilityFields.find(f => f.key === field)?.label || field;
                    secondRowFieldCols.push(fieldLabel);
                }
            }
            
            // 构建数据行
            let rows = [];
            let serialNum = 1;
            for (let item of filteredStations) {
                const stationName = item.station;
                const stationInfo = stationData[stationName];
                if (!stationInfo) continue;
                
                let row = [serialNum++, stationName, stationInfo.railway, stationInfo.section, stationInfo.level];
                
                for (let facilityType of selectedFacilityTypes) {
                    const facilityInfo = facilityInfoMap[facilityType];
                    const details = facilityDetailData[stationName] || {};
                    const facilities = details[facilityInfo.dataKey] || [];
                    
                    for (let field of selectedStatFields) {
                        let totalValue = 0;
                        let priceCount = 0;
                        let priceTotal = 0;
                        
                        for (let fac of facilities) {
                            if (field === 'area') totalValue += fac.area || 0;
                            else if (field === 'hasToilet') totalValue += fac.hasToilet === '有' ? 1 : 0;
                            else if (field === 'noToilet') totalValue += fac.hasToilet === '无' ? 1 : 0;
                            else if (field === 'hasKitchen') totalValue += fac.hasKitchen === '有' ? 1 : 0;
                            else if (field === 'noKitchen') totalValue += fac.hasKitchen === '无' ? 1 : 0;
                            else if (field === 'sofaCount') totalValue += fac.sofaCount || 0;
                            else if (field === 'seatCount') totalValue += fac.seatCount || 0;
                            else if (field === 'price') {
                                if (fac.price) {
                                    priceTotal += fac.price;
                                    priceCount++;
                                }
                            }
                        }
                        
                        if (field === 'price') {
                            let avgPrice = priceCount > 0 ? (priceTotal / priceCount).toFixed(0) : 0;
                            row.push(avgPrice);
                        } else {
                            row.push(totalValue);
                        }
                    }
                }
                rows.push(row);
            }
            
            // 渲染表格表头
            let tableHtml = '<table class="stats-table"><thead>';
            tableHtml += '<tr>';
            for (let cell of firstRowFixedCols) {
                tableHtml += `<th rowspan="2">${cell}</th>`;
            }
            for (let cell of firstRowFacilityCols) {
                tableHtml += `<th colspan="${cell.colspan}">${cell.value}</th>`;
            }
            tableHtml += '</tr>';
            tableHtml += '<tr>';
            for (let cell of secondRowFieldCols) {
                tableHtml += `<th>${cell}</th>`;
            }
            tableHtml += '</tr>';
            tableHtml += '</thead><tbody>';
            
            for (let row of rows) {
                tableHtml += '<tr>';
                for (let cell of row) tableHtml += `<td>${cell}</td>`;
                tableHtml += '</tr>';
            }
            tableHtml += '</tbody></table>';
            allHtml += tableHtml;
        }
        
        if (allHtml === '') {
            allHtml = '<div style="text-align:center;padding:20px;">没有匹配的数据，请检查筛选条件</div>';
        }
        
        document.getElementById('statsModalBody').innerHTML = allHtml;
        document.getElementById('statsModal').style.display = 'block';
    }
    
    function closeStatsModal() { document.getElementById('statsModal').style.display = 'none'; }
    
    function getStationsByNode(nodeType, nodeName) {
        let stations = [];
        if (nodeType==='guotie') {
            for (let r in orgData["国铁集团"]) for (let s in orgData["国铁集团"][r]) for (let st of orgData["国铁集团"][r][s]) if(stationData[st]) stations.push({ railway:r, section:s, station:st });
        } else if (nodeType==='railway') {
            for (let s in orgData["国铁集团"][nodeName]) for (let st of orgData["国铁集团"][nodeName][s]) if(stationData[st]) stations.push({ railway:nodeName, section:s, station:st });
        } else if (nodeType==='section') {
            for (let r in orgData["国铁集团"]) if(orgData["国铁集团"][r][nodeName]) for(let st of orgData["国铁集团"][r][nodeName]) if(stationData[st]) stations.push({ railway:r, section:nodeName, station:st });
        } else if (nodeType==='station') {
            for (let r in orgData["国铁集团"]) for (let s in orgData["国铁集团"][r]) if(orgData["国铁集团"][r][s].includes(nodeName)) { stations.push({ railway:r, section:s, station:nodeName }); break; }
        }
        return stations;
    }
    
    function selectTreeNode(nodeType, nodeName, event) {
        if(event) event.stopPropagation();
        currentStationsList = getStationsByNode(nodeType, nodeName);
        applyFilters();
        document.querySelectorAll('.tree-node-header').forEach(el=>el.classList.remove('selected'));
        if(event && event.currentTarget) event.currentTarget.classList.add('selected');
    }
    
    function toggleNode(header, event) {
        if(event) event.stopPropagation();
        let children = header.parentElement.querySelector('.tree-children');
        if(children) children.classList.toggle('open');
    }
    
    function renderTree() {
        let container = document.getElementById('treeContainer');
        container.innerHTML = '';
        let guotie = document.createElement('div'); guotie.className = 'tree-node';
        guotie.innerHTML = `<div class="tree-node-header" onclick="selectTreeNode('guotie','',event)"><span class="tree-icon">🏢</span><span class="node-name">🏢 国铁集团</span></div>`;
        let children = document.createElement('div'); children.className = 'tree-children open';
        for (let r in orgData["国铁集团"]) {
            let rDiv = document.createElement('div'); rDiv.className = 'tree-node';
            rDiv.innerHTML = `<div class="tree-node-header" onclick="selectTreeNode('railway','${r}',event); toggleNode(this,event)"><span class="tree-icon">🏛️</span><span class="node-name">${r}</span></div>`;
            let rChild = document.createElement('div'); rChild.className = 'tree-children';
            for (let s in orgData["国铁集团"][r]) {
                let sDiv = document.createElement('div'); sDiv.className = 'tree-node';
                sDiv.innerHTML = `<div class="tree-node-header" onclick="selectTreeNode('section','${s}',event); toggleNode(this,event)"><span class="tree-icon">📁</span><span class="node-name">${s}</span></div>`;
                let sChild = document.createElement('div'); sChild.className = 'tree-children';
                for (let st of orgData["国铁集团"][r][s]) {
                    if(!stationData[st]) continue;
                    let stDiv = document.createElement('div'); stDiv.className = 'tree-node';
                    stDiv.innerHTML = `<div class="tree-node-header" onclick="selectTreeNode('station','${st}',event)"><span class="tree-icon">🚉</span><span class="node-name">${st}</span></div>`;
                    sChild.appendChild(stDiv);
                }
                sDiv.appendChild(sChild); rChild.appendChild(sDiv);
            }
            rDiv.appendChild(rChild); children.appendChild(rDiv);
        }
        guotie.appendChild(children); container.appendChild(guotie);
    }
    
    function exportToExcel() {
        let selectedTypes = getSelectedRoomTypes();
        if(!filteredStations.length || !selectedTypes.length) { alert("无数据可导出"); return; }
        let rows = [["序号","车站名称","路局","站段","车站等级"]];
        for(let type of selectedTypes) for(let col of visibleColumns) rows[0].push(`${getRoomTypeName(type)}_${allColumnDefs.find(c=>c.key===col)?.label||col}`);
        let sn=1;
        for(let item of filteredStations) {
            let d = item.data, row = [sn++, item.station, d.railway, d.section, d.level];
            for(let type of selectedTypes) {
                let room = d[type];
                for(let col of visibleColumns) row.push(room ? getCellValue(room,col) : '-');
            }
            rows.push(row);
        }
        let csv = rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
        let blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8"});
        let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="商务候车室统计报表.csv"; a.click(); URL.revokeObjectURL(a.href);
    }
    
    initColumnFilterPanel();
    initFacilityFieldPanel();
    renderTree();
    selectTreeNode('guotie','',null);
</script>
